<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Malgun Gothic', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  max-width: 420px;
  width: 100%;
}
h1 {
  color: #fff;

  margin-bottom: 8px;
}

.card {

  background: #fff;
  border-radius: 16px;

  text-decoration: none;
  color: #333;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  transition: transform 0.2s;
}
.card:active { transform: scale(0.97); }
.card-icon { font-size: 2.2rem; margin-bottom: 12px; }
.card-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; }
.card-desc { font-size: 0.95rem; color: #666; line-height: 1.5; }
.card-ai { border-left: 5px solid #1565C0; }
.card-basic { border-left: 5px solid #00695C; }
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 700;
  color: #fff;
  margin-bottom: 8px;
}
.badge-ai { background: #1565C0; }

</style>
</head>
